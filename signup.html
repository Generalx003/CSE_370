<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club-Collab Sign Up</title>
    <link rel="stylesheet" href="css/login_modern.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fa-solid fa-users-gear"></i>
                <h1>Club-Collab</h1>
                <p>Create a New Account</p>
            </div>

            <form id="signupForm" class="login-form signup-compact">
                <div class="form-row-2">
                    <div class="form-group">
                        <label>Full Name</label>
                        <div class="input-group">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="signupName" name="name" placeholder="Enter your full name" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <div class="input-group">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" id="signupEmail" name="email" placeholder="Enter your email" required />
                        </div>
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label>Password</label>
                        <div class="input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="signupPassword" name="password" placeholder="Create a password" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Phone Number</label>
                        <div class="input-group">
                            <i class="fa-solid fa-phone"></i>
                            <input type="text" id="signupContact" name="contact_no" placeholder="Enter phone number" required />
                        </div>
                    </div>
                </div>

                <div class="form-row-3">
                    <div class="form-group">
                        <label>Street Address</label>
                        <div class="input-group">
                            <i class="fa-solid fa-location-dot"></i>
                            <input type="text" id="signupStreet" name="street" placeholder="Street" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>City</label>
                        <div class="input-group">
                            <input type="text" id="signupCity" name="city" placeholder="City" required />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Zip Code</label>
                        <div class="input-group">
                            <input type="text" id="signupZip" name="zip" placeholder="Zip" required />
                        </div>
                    </div>
                </div>

                <div class="form-row-2">
                    <div class="form-group">
                        <label>Student Type</label>
                        <div class="input-group">
                            <i class="fa-solid fa-graduation-cap"></i>
                            <select id="signupType" name="student_type" required>
                                <option value="general">General Student</option>
                                <option value="executive">Club Executive</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Profile Picture (Optional)</label>
                        <div class="input-group">
                            <i class="fa-solid fa-image"></i>
                            <input type="file" id="signupImage" name="profile_image" accept="image/*" />
                        </div>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fa-solid fa-user-plus"></i> Sign Up
                </button>
            </form>

            <div style="text-align: center; margin-top: 1rem;">
                <p style="color: var(--gray-600); font-size: 0.875rem;">Already have an account? <a href="login.html">Login here</a></p>
            </div>
        </div>
    </div>

    <script src="js/signup.js"></script>
</body>
</html>
