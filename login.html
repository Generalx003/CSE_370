<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club-Collab Login</title>
    <link rel="stylesheet" href="css/login_modern.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fa-solid fa-users-gear"></i>
                <h1>Club-Collab</h1>
                <p>University Club Management System</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <div class="input-group">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" name="email" id="email" placeholder="Enter your email" autocomplete="email" required />
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" name="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fa-solid fa-sign-in-alt"></i> Login
                </button>
            </form>

            <div class="error-message" id="errorMessage" style="display: none;"></div>
            
            <div style="text-align: center; margin-top: 1rem;">
                <p style="color: var(--gray-600); font-size: 0.875rem;">Don't have an account? <a href="signup.html">Sign up here</a></p>
            </div>

            <div class="demo-accounts">
                <h3>Demo Accounts</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                    <div class="account-info">
                        <strong>Student</strong><br>
                        student@example.edu<br>
                        student123
                    </div>
                    <div class="account-info">
                        <strong>Admin</strong><br>
                        admin@example.edu<br>
                        admin123
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
